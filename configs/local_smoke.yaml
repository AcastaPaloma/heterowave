seed: 1337
device: cuda
precision: fp32
compile: false

data:
  dataset: synthetic
  image_size: 32
  batch_size: 2
  num_workers: 0
  train_samples: 16
  val_samples: 8
  preprocess: false

physics:
  num_angles: 16
  detector_bins: 32
  align_corners: false

visualization:
  output: outputs/physics_smoke.png

model:
  name: fbp_unet
  channels: [4, 8]
  residual_output: true

optimizer:
  name: adamw
  learning_rate: 0.001
  weight_decay: 0.0001

loss:
  image_weight: 1.0
  gradient_weight: 0.1

training:
  epochs: 20
  max_steps: 20
  gradient_clip: 1.0
  validate_every_epochs: 1
  checkpoint_metric: nrmse
  checkpoint_mode: min
  resume: null

output:
  root: outputs/local_smoke
