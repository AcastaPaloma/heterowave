seed: 1337
device: cuda
precision: fp32
compile: false

data:
  dataset: synthetic
  root: null
  image_size: 32
  batch_size: 2
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  train_samples: 8
  val_samples: 4
  preprocess: false

physics:
  num_angles: 16
  detector_bins: 32
  num_sectors: 16
  align_corners: false

visualization:
  output: outputs/heterowave_v3_smoke.png

model:
  name: heterowave_v3
  channels: [4, 8]
  residual_output: true
  aggregation: mean_var_count
  geometry_channels: true
  uncertainty: false
  sector_fusion: true
  attention_fusion: true
  sector_statistics: true
  angle_fourier_bands: 2
  mask_film: true
  mask_fourier_bands: 4
  mask_embedding_dim: 16
  fusion_gate_init: 0.0
  freeze_global_trunk: false

acquisition:
  enabled: false
  noise_std: 0.0
  gain_std: 0.0
  bias_std: 0.0
  detector_shift_std: 0.0

masking:
  minimum_sectors: 2
  random_probability: 0.50
  wedge_probability: 0.35
  periodic_probability: 0.15
  validation_masks: configs/validation_masks_seed1337.json

optimizer:
  name: adamw
  learning_rate: 0.001
  weight_decay: 0.0001

loss:
  image_weight: 1.0
  gradient_weight: 0.1
  data_weight: 0.05
  data_every_n_steps: 2
  data_angle_fraction: 0.5
  uncertainty_weight: 0.0

training:
  epochs: 10
  max_steps: 4
  gradient_clip: 1.0
  validate_every_epochs: 1
  checkpoint_metric: nrmse
  checkpoint_mode: min
  resume: null

output:
  root: outputs/heterowave_v3_smoke
