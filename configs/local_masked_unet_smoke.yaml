seed: 1337
device: cuda
precision: fp32
compile: false

data:
  dataset: synthetic
  root: null
  image_size: 32
  batch_size: 2
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  train_samples: 8
  val_samples: 4
  preprocess: false

physics:
  num_angles: 16
  detector_bins: 32
  num_sectors: 16
  align_corners: false

visualization:
  output: outputs/masked_unet_smoke.png

model:
  name: masked_fbp_unet
  channels: [4, 8]
  residual_output: true
  aggregation: mean_var_count
  geometry_channels: true
  uncertainty: false

masking:
  minimum_sectors: 2
  random_probability: 0.50
  wedge_probability: 0.35
  periodic_probability: 0.15
  validation_masks: configs/validation_masks_seed1337.json

optimizer:
  name: adamw
  learning_rate: 0.001
  weight_decay: 0.0001

loss:
  image_weight: 1.0
  gradient_weight: 0.1

training:
  epochs: 10
  max_steps: 4
  gradient_clip: 1.0
  validate_every_epochs: 1
  checkpoint_metric: nrmse
  checkpoint_mode: min
  resume: null

output:
  root: outputs/masked_unet_smoke
